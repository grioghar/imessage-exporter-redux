name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # top-level only — pulls lightpress, NOT its ffmpeg submodule

      - name: Install SQLite3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Test
        run: ctest --test-dir build --output-on-failure

  gui:
    name: desktop GUI (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # top-level only — pulls lightpress, NOT its ffmpeg submodule

      - name: Install SQLite3 + GL (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev libgl1-mesa-dev

      - name: Install SQLite3 (Windows, via vcpkg)
        if: runner.os == 'Windows'
        run: vcpkg install sqlite3:x64-windows

      - name: Install Qt 6
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true

      - name: Configure
        shell: bash
        run: |
          EXTRA=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            EXTRA="-DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          fi
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release $EXTRA

      - name: Build GUI
        run: cmake --build build --config Release --target imessage-exporter-gui

  docker:
    name: docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # top-level only — pulls lightpress, NOT its ffmpeg submodule

      - name: Build image
        run: docker build -t imessage-exporter:ci .

      - name: Smoke test (runs the built binary)
        run: |
          docker run --rm imessage-exporter:ci --version
          docker run --rm imessage-exporter:ci --help

  package-defs:
    name: packaging definitions (brew/choco)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # top-level only — pulls lightpress, NOT its ffmpeg submodule

      - name: Homebrew formula/cask syntax
        run: |
          ruby -c packaging/homebrew/imessage-exporter.rb
          ruby -c packaging/homebrew/imessage-exporter-app.rb

      - name: Chocolatey nuspec is well-formed XML
        run: |
          sudo apt-get update && sudo apt-get install -y libxml2-utils
          xmllint --noout packaging/chocolatey/imessage-exporter.nuspec

      - name: Chocolatey PowerShell scripts parse
        shell: pwsh
        run: |
          $bad = 0
          Get-ChildItem packaging/chocolatey/tools/*.ps1 | ForEach-Object {
            $errors = $null
            [System.Management.Automation.PSParser]::Tokenize(
              (Get-Content -Raw $_.FullName), [ref]$errors) | Out-Null
            if ($errors.Count) { Write-Error "Parse errors in $($_.Name)"; $bad = 1 }
          }
          exit $bad
