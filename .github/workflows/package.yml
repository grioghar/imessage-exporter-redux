name: package

# Builds self-contained desktop installers and, for a real v* tag, publishes
# them as a GitHub Release. Run on demand (Actions -> package -> Run workflow)
# to just build the artifacts, or push a v* tag to also cut the release.
#
# Artifacts are UNSIGNED: macOS Gatekeeper and Windows SmartScreen will warn
# until code signing / notarization (Apple Developer ID / a Windows cert) are
# configured — see CLAUDE.md.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  macos:
    name: macOS .app + .dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target imessage-exporter-gui
      - name: App icon
        run: |
          brew install librsvg >/dev/null
          mkdir icon.iconset
          for s in 16 32 64 128 256 512; do
            rsvg-convert -w $s -h $s assets/icon.svg -o "icon.iconset/icon_${s}x${s}.png"
            rsvg-convert -w $((s*2)) -h $((s*2)) assets/icon.svg -o "icon.iconset/icon_${s}x${s}@2x.png"
          done
          iconutil -c icns icon.iconset -o AppIcon.icns
          APP="build/iMessage Exporter.app"
          mkdir -p "$APP/Contents/Resources"
          cp AppIcon.icns "$APP/Contents/Resources/AppIcon.icns"
          /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" \
            "$APP/Contents/Info.plist" \
            || /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" \
            "$APP/Contents/Info.plist"
      - name: Bundle Qt + make DMG
        run: |
          macdeployqt "build/iMessage Exporter.app" -dmg
          mkdir -p dist
          mv "build/iMessage Exporter.dmg" "dist/iMessage-Exporter-macOS.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: imessage-exporter-macos
          path: dist/*

  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite3 (vcpkg)
        run: vcpkg install sqlite3:x64-windows
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true
      - name: Install Inno Setup + ImageMagick
        run: |
          choco install innosetup -y --no-progress
          choco install imagemagick -y --no-progress
      - name: Render app icon (.ico)
        shell: bash
        run: |
          # Best-effort: embed in the .exe (via assets/app_icon.rc) when produced.
          magick -background none -density 512 assets/icon.svg \
            -define icon:auto-resize=256,128,64,48,32,16 assets/icon.ico || \
            echo "icon render skipped (no SVG delegate)"
      - name: Build
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release --target imessage-exporter-gui
      - name: Stage app + compile installer
        shell: bash
        run: |
          mkdir -p installer_build/staging
          cp build/Release/imessage-exporter-gui.exe installer_build/staging/
          cp "$VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/sqlite3.dll" installer_build/staging/ || true
          windeployqt installer_build/staging/imessage-exporter-gui.exe
          cp packaging/windows/installer.iss installer_build/
          cp assets/icon.ico installer_build/ || true
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" installer_build/installer.iss
          mkdir -p dist && cp installer_build/dist/iMessage-Exporter-Setup.exe dist/
      - uses: actions/upload-artifact@v4
        with:
          name: imessage-exporter-windows
          path: dist/*

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libgl1-mesa-dev librsvg2-bin file
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target imessage-exporter-gui
      - name: Stage AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp build/imessage-exporter-gui AppDir/usr/bin/
          rsvg-convert -w 256 -h 256 assets/icon.svg -o AppDir/imessage-exporter.png
          cat > AppDir/imessage-exporter.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=iMessage Exporter
          Exec=imessage-exporter-gui
          Icon=imessage-exporter
          Categories=Utility;
          EOF
      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          # linuxdeploy finds its qt plugin on PATH; nested AppImages need extract-and-run (no FUSE on CI).
          export PATH="$PWD:$PATH"
          export APPIMAGE_EXTRACT_AND_RUN=1
          export QMAKE="$(command -v qmake6 || command -v qmake)"
          # linuxdeploy's appimage output honors $OUTPUT for the filename; set it
          # explicitly so we don't glob the linuxdeploy tool AppImages.
          export OUTPUT="iMessage-Exporter-x86_64.AppImage"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            -d AppDir/imessage-exporter.desktop \
            -i AppDir/imessage-exporter.png \
            --plugin qt --output appimage
          mkdir -p dist && mv "$OUTPUT" dist/
      - uses: actions/upload-artifact@v4
        with:
          name: imessage-exporter-linux
          path: dist/*

  deb:
    name: Linux .deb (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps (distro Qt)
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake g++ qt6-base-dev libqt6svg6-dev \
            libgl1-mesa-dev libsqlite3-dev dpkg-dev file
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
      - name: Package (.deb)
        run: |
          ( cd build && cpack -G DEB )
          mkdir -p dist && cp build/*.deb dist/
      - uses: actions/upload-artifact@v4
        with:
          name: imessage-exporter-deb
          path: dist/*

  rpm:
    name: Linux .rpm (Fedora/RHEL)
    runs-on: ubuntu-latest
    container: fedora:40
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps (distro Qt)
        run: |
          dnf install -y cmake gcc-c++ qt6-qtbase-devel qt6-qtsvg-devel \
            sqlite-devel mesa-libGL-devel rpm-build
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel
      - name: Package (.rpm)
        run: |
          ( cd build && cpack -G RPM )
          mkdir -p dist && cp build/*.rpm dist/
      - uses: actions/upload-artifact@v4
        with:
          name: imessage-exporter-rpm
          path: dist/*

  snap:
    name: Linux Snap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: snapcore/action-build@v1
        id: snapcraft
      - uses: actions/upload-artifact@v4
        with:
          name: imessage-exporter-snap
          path: ${{ steps.snapcraft.outputs.snap }}

  release:
    name: publish release
    needs: [macos, windows, linux, deb, rpm, snap]
    runs-on: ubuntu-latest
    # Real version tags only — test tags (e.g. v0.0.0-test) build artifacts but
    # do not create a release.
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'test')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: artifacts/**/*
