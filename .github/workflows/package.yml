name: package

# Builds self-contained desktop bundles. Run on demand (Actions -> package ->
# Run workflow) or by pushing a v* tag. Artifacts are UNSIGNED: macOS Gatekeeper
# and Windows SmartScreen will warn until code signing / notarization (which
# need an Apple Developer ID / a Windows cert) are wired up — see CLAUDE.md.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  macos:
    name: macOS .app + .dmg
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target imessage-exporter-gui
      - name: Bundle Qt + make DMG
        run: |
          macdeployqt "build/iMessage Exporter.app" -dmg
          mkdir -p dist
          mv "build/iMessage Exporter.dmg" "dist/iMessage-Exporter-macOS.dmg"
      - uses: actions/upload-artifact@v4
        with:
          name: imessage-exporter-macos
          path: dist/*

  windows:
    name: Windows .exe (zip)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite3 (vcpkg)
        run: vcpkg install sqlite3:x64-windows
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true
      - name: Build
        shell: bash
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build build --config Release --target imessage-exporter-gui
      - name: Bundle Qt + SQLite DLLs
        shell: bash
        run: |
          mkdir -p "dist/iMessage Exporter"
          cp build/Release/imessage-exporter-gui.exe "dist/iMessage Exporter/"
          cp "$VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin/sqlite3.dll" "dist/iMessage Exporter/" || true
          windeployqt "dist/iMessage Exporter/imessage-exporter-gui.exe"
      - uses: actions/upload-artifact@v4
        with:
          name: imessage-exporter-windows
          path: dist/*

  linux:
    name: Linux AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libgl1-mesa-dev imagemagick file
      - uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          cache: true
      - name: Build
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release --target imessage-exporter-gui
      - name: Stage AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp build/imessage-exporter-gui AppDir/usr/bin/
          convert -size 256x256 xc:'#0b84ff' AppDir/imessage-exporter.png
          cat > AppDir/imessage-exporter.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=iMessage Exporter
          Exec=imessage-exporter-gui
          Icon=imessage-exporter
          Categories=Utility;
          EOF
      - name: Build AppImage
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          # linuxdeploy finds its qt plugin on PATH; nested AppImages need extract-and-run (no FUSE on CI).
          export PATH="$PWD:$PATH"
          export APPIMAGE_EXTRACT_AND_RUN=1
          export QMAKE="$(command -v qmake6 || command -v qmake)"
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            -d AppDir/imessage-exporter.desktop \
            -i AppDir/imessage-exporter.png \
            --plugin qt --output appimage
          mkdir -p dist && mv *.AppImage dist/iMessage-Exporter-x86_64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: imessage-exporter-linux
          path: dist/*
