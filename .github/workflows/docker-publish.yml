name: docker-publish

# Publishes the CLI image to the GitHub Container Registry (ghcr.io) on a v* tag
# or on demand — no extra secrets needed (uses the built-in GITHUB_TOKEN).
#
# To ALSO push to Docker Hub: add repo secrets DOCKERHUB_USERNAME and
# DOCKERHUB_TOKEN, then uncomment the Docker Hub login + add
# "docker.io/<user>/imessage-exporter" to the images list below.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/grioghar/imessage-exporter-redux
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
